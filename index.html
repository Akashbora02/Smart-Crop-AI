<!DOCTYPE html>
<html>
<head>
<title>🌾 Smart Crop AI Assistant</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c7744, #a8e063);
  margin: 0;
  color: white;
}

h2 {
  text-align: center;
  padding: 15px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.card {
  background: #f4fbf2;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
}

input, select {
  width: 95%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  border: none;
  margin-top: 10px;
}

.btn-analyze {
  background: linear-gradient(45deg, #2e7d32, #66bb6a);
  color: white;
}

.btn-location {
  background: linear-gradient(45deg, #1565c0, #42a5f5);
  color: white;
}

.result-box {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
}

.color-box {
  height: 25px;
  margin-top: 5px;
  border-radius: 5px;
}

#map {
  height: 220px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>

</head>

<body>

<h2>🌾 Smart Crop AI Assistant</h2>

<div class="container">

<div class="card">
<label>🌱 Crop</label>
<select id="crop" onchange="setMoistureRange()">
<option value="rice">Rice</option>
<option value="wheat">Wheat</option>
<option value="cotton">Cotton</option>
<option value="sugarcane">Sugarcane</option>
<option value="soybean">Soybean</option>
</select>
</div>

<div class="card">
<label>💧 Moisture (%)</label>
<input type="number" id="moisture">
<small id="moistureHint"></small>
</div>

<div class="card">
<label>🐛 Pest</label>
<select id="pest">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="card">
<label>🍃 Leaf Damage (1–6)</label>
<input type="number" id="leaf">
<small>1 = Healthy | 6 = Severe Damage</small>
</div>

<div class="card">
<label>🎨 Leaf Color</label>
<select id="color" onchange="showColor()">
<option value="1">Green (Healthy)</option>
<option value="2">Light Yellow</option>
<option value="3">Yellow</option>
<option value="4">Orange</option>
<option value="5">Brown (Severe)</option>
</select>
<div id="colorBox" class="color-box"></div>
</div>

<button class="btn-analyze" onclick="predict()">🔍 Analyze Crop</button>

<div id="result" class="result-box"></div>

<button class="btn-location" onclick="getLocation()">📍 Find Nearby KrushiSeva Kendra</button>

<div id="map"></div>
<div id="kendraList"></div>

</div>

<script>

// Moisture ranges
const ranges = {
  rice:[60,80],
  wheat:[40,60],
  cotton:[50,70],
  sugarcane:[70,90],
  soybean:[45,65]
};

function setMoistureRange(){
  let crop = document.getElementById("crop").value;
  let r = ranges[crop];
  document.getElementById("moistureHint").innerText =
    "Ideal Range: "+r[0]+" - "+r[1]+"%";
}

// Color preview
function showColor(){
  let colors=["#4caf50","#ffeb3b","#ffc107","#ff9800","#795548"];
  let val=document.getElementById("color").value;
  document.getElementById("colorBox").style.background=colors[val-1];
}

// Prediction (NO BACKEND)
function predict(){

  let moisture = parseFloat(document.getElementById("moisture").value);
  let leaf = parseFloat(document.getElementById("leaf").value);
  let color = parseInt(document.getElementById("color").value);
  let pest = parseInt(document.getElementById("pest").value);

  // Validation
  if(isNaN(moisture) || isNaN(leaf)){
    document.getElementById("result").innerHTML = "⚠ Fill all fields";
    return;
  }

  if(moisture < 0 || moisture > 100){
    document.getElementById("result").innerHTML = "❌ Moisture must be 0–100";
    return;
  }

  if(leaf < 1 || leaf > 6){
    document.getElementById("result").innerHTML = "❌ Leaf damage must be 1–6";
    return;
  }

  // Disease logic
  let disease="", advice="";

  if(color >= 5 && leaf >= 4){
    disease="Leaf Blight";
    advice="Apply fungicide spray.";
  }
  else if(color == 4 && pest == 1){
    disease="Bacterial Spot";
    advice="Reduce irrigation.";
  }
  else if(color == 3 && leaf >= 3){
    disease="Yellow Rust";
    advice="Use resistant seeds.";
  }
  else if(moisture > 80){
    disease="Root Rot";
    advice="Improve drainage.";
  }
  else if(pest == 1){
    disease="Pest Attack";
    advice="Use pesticide.";
  }
  else{
    disease="Healthy";
    advice="Crop is healthy.";
  }

  let score = (moisture/20)+(leaf*2)+(color*3)+(pest*8);

  let risk="", bg="#81c784";

  if(score > 25){
    risk="⚠ High Risk";
    bg="#ff5252";
  }
  else if(score > 12){
    risk="⚡ Moderate Risk";
    bg="#ffca28";
  }
  else{
    risk="✅ Low Risk";
  }

  document.getElementById("result").style.background=bg;
  document.getElementById("result").innerHTML =
    `${risk}<br>🌿 ${disease}<br>💡 ${advice}`;
}

// Map (works without backend)
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    document.getElementById("map").innerHTML =
      `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${lat},${lon}&z=13&output=embed"></iframe>`;

    let url=`https://www.google.com/maps/search/krushi+seva+kendra/@${lat},${lon},13z`;

    document.getElementById("kendraList").innerHTML =
      `<a href="${url}" target="_blank">🌱 View Nearby Centers</a>`;
  });
}

setMoistureRange();
showColor();

</script>

</body>
</html>
