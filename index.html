<!DOCTYPE html>
<html>
<head>
<title>🌾 Smart Crop AI Assistant</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c7744, #a8e063);
  margin: 0;
  color: white;
}

h2 {
  text-align: center;
  padding: 15px;
  font-size: 28px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #ffffff;
  color: #333;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

/* Card style */
.card {
  background: #f4fbf2;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Inputs */
input, select {
  width: 95%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Buttons */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

/* Analyze button */
.btn-analyze {
  background: linear-gradient(45deg, #2e7d32, #66bb6a);
  color: white;
}

.btn-analyze:hover {
  transform: scale(1.05);
  background: linear-gradient(45deg, #1b5e20, #4caf50);
}

/* Location button */
.btn-location {
  background: linear-gradient(45deg, #1565c0, #42a5f5);
  color: white;
}

.btn-location:hover {
  transform: scale(1.05);
}

/* Result box */
.result-box {
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  font-size: 16px;
  text-align: center;
  font-weight: bold;
}

/* Color preview */
.color-box {
  height: 25px;
  margin-top: 5px;
  border-radius: 5px;
}

/* Map */
#map {
  height: 220px;
  margin-top: 10px;
  border-radius: 10px;
  overflow: hidden;
}

.link-box {
  text-align: center;
  margin-top: 10px;
}
</style>

</head>

<body>

<h2>🌾 Smart Crop AI Assistant</h2>

<div class="container">

<div class="card">
<label>🌱 Crop</label>
<select id="crop" onchange="setMoistureRange()">
<option value="rice">Rice</option>
<option value="wheat">Wheat</option>
<option value="cotton">Cotton</option>
<option value="sugarcane">Sugarcane</option>
<option value="soybean">Soybean</option>
</select>
</div>

<div class="card">
<label>💧 Moisture (%)</label>
<input type="number" id="moisture">
<small id="moistureHint"></small>
</div>

<div class="card">
<label>🐛 Pest</label>
<select id="pest">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="card">
<label>🍃 Leaf Damage (1–6)</label>
<input type="number" id="leaf">
<small>1 = Healthy | 6 = Severe Damage</small>
</div>

<div class="card">
<label>🎨 Leaf Color</label>
<select id="color" onchange="showColor()">
<option value="1">Green (Healthy)</option>
<option value="2">Light Yellow</option>
<option value="3">Yellow</option>
<option value="4">Orange</option>
<option value="5">Brown (Severe)</option>
</select>
<div id="colorBox" class="color-box"></div>
</div>

<button class="btn-analyze" onclick="predict()">🔍 Analyze Crop</button>

<div id="result" class="result-box"></div>

<button class="btn-location" onclick="getLocation()">📍 Find Nearby krushiSeva Kendra</button>

<div id="map"></div>

<div id="kendraList" class="link-box"></div>

</div>

<script>

// Moisture ranges
const ranges = {
  rice:[60,80],
  wheat:[40,60],
  cotton:[50,70],
  sugarcane:[70,90],
  soybean:[45,65]
};

function setMoistureRange(){
  let crop = document.getElementById("crop").value;
  let r = ranges[crop];
  document.getElementById("moistureHint").innerText =
    "Ideal Range: "+r[0]+" - "+r[1]+"%";
}

// Color preview
function showColor(){
  let colors=["#4caf50","#ffeb3b","#ffc107","#ff9800","#795548"];
  let val=document.getElementById("color").value;
  document.getElementById("colorBox").style.background=colors[val-1];
}

// Prediction
function predict(){

  let moisture = document.getElementById("moisture").value;
  let leaf = document.getElementById("leaf").value;

  // 🚫 Frontend validation
  if(moisture === "" || leaf === ""){
    document.getElementById("result").innerHTML = "⚠ Please fill all fields";
    return;
  }

  if(moisture < 0 || moisture > 100){
    document.getElementById("result").innerHTML = "❌ Moisture must be 0–100";
    return;
  }

  if(leaf < 1 || leaf > 6){
    document.getElementById("result").innerHTML = "❌ Leaf damage must be 1–6";
    return;
  }

  let data={
    moisture:moisture,
    pest:document.getElementById("pest").value,
    leaf:leaf,
    color:document.getElementById("color").value
  };

  fetch("http://127.0.0.1:5000/predict",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(res=>{

    // 🚫 Backend error
    if(res.error){
      document.getElementById("result").style.background="#ff5252";
      document.getElementById("result").innerHTML = "❌ " + res.error;
      return;
    }

    let color="lightgreen";
    if(res.risk.includes("High")) color="#ff5252";
    else if(res.risk.includes("Moderate")) color="#ffca28";

    document.getElementById("result").style.background=color;

    document.getElementById("result").innerHTML =
      `${res.risk}<br>🌿 ${res.disease}<br>💡 ${res.advice}`;
  })
  .catch(()=>{
    document.getElementById("result").innerHTML="⚠ Backend not running";
  });
}
// Map
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;

    document.getElementById("map").innerHTML =
      `<iframe width="100%" height="100%" src="https://maps.google.com/maps?q=${lat},${lon}&z=13&output=embed"></iframe>`;

    let url=`https://www.google.com/maps/search/krushi+seva+kendra/@${lat},${lon},13z`;

    document.getElementById("kendraList").innerHTML =
      `<a href="${url}" target="_blank">🌱 View Nearby Centers</a>`;
  });
}

setMoistureRange();
showColor();

</script>

</body>
</html>
